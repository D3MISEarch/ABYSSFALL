name: Persistence Tests

on:
  pull_request:
    paths:
      - "scripts/persistence/**"
      - "scripts/boot.gd"
      - "project.godot"
      - ".github/workflows/persistence-tests.yml"
  push:
    branches:
      - main
    paths:
      - "scripts/persistence/**"
      - "scripts/boot.gd"
      - "project.godot"
      - ".github/workflows/persistence-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: persistence-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  persistence-smoke-test:
    name: Godot 4.2 Persistence Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.2.2
          use-dotnet: false
          include-templates: false

      - name: Show Godot version
        run: godot --version

      - name: Import project
        run: godot --headless --editor --path . --quit

      - name: Run persistence smoke tests
        run: godot --headless --path . --script res://scripts/persistence/tests/test_save_manager.gd
