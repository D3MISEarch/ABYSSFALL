name: Runtime Foundation Tests

on:
  pull_request:
    paths:
      - "scripts/runtime/**"
      - "scripts/persistence/**"
      - "scripts/shared/**"
      - "Docs/ADR/**"
      - "project.godot"
      - ".github/workflows/runtime-foundation-tests.yml"
  push:
    branches:
      - main
    paths:
      - "scripts/runtime/**"
      - "scripts/persistence/**"
      - "scripts/shared/**"
      - "Docs/ADR/**"
      - "project.godot"
      - ".github/workflows/runtime-foundation-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-foundation-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-foundation-smoke-test:
    name: Godot 4.4.1 Runtime Foundation Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.1
          use-dotnet: false
          include-templates: false

      - name: Show Godot version
        run: godot --version

      - name: Import project
        run: godot --headless --editor --path . --quit

      - name: Run runtime regression suites
        shell: bash
        run: |
          set -euo pipefail

          run_suite() {
            local script="$1"
            local log="$2"
            echo "Running ${script}"
            godot --headless --path . --script "${script}" 2>&1 | tee "${log}"
            if grep -Eiq 'SCRIPT ERROR|PARSER ERROR|Parse Error|ASSERTION FAILED|^FAIL:' "${log}"; then
              echo "Godot reported a script, parser, or assertion failure in ${script}."
              exit 1
            fi
            if ! grep -Eq '^PASS:' "${log}"; then
              echo "Missing explicit PASS marker for ${script}."
              exit 1
            fi
          }

          run_suite res://scripts/runtime/tests/test_runtime_foundation.gd runtime-foundation-test.log
          run_suite res://scripts/runtime/tests/test_runtime_session.gd runtime-session-test.log
          run_suite res://scripts/runtime/tests/test_ability_execution.gd ability-execution-test.log
          run_suite res://scripts/runtime/tests/test_stage34_catalog_inventory.gd stage34-catalog-inventory-test.log
          run_suite res://scripts/runtime/tests/test_stage34_equipment_stats.gd stage34-equipment-stats-test.log
          run_suite res://scripts/runtime/tests/test_stage34_rewards.gd stage34-rewards-test.log
          run_suite res://scripts/runtime/tests/test_stage34_vertical_slice.gd stage34-vertical-slice-test.log

      - name: Upload runtime test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-foundation-test-logs
          path: |
            runtime-foundation-test.log
            runtime-session-test.log
            ability-execution-test.log
            stage34-catalog-inventory-test.log
            stage34-equipment-stats-test.log
            stage34-rewards-test.log
            stage34-vertical-slice-test.log
          if-no-files-found: warn
          retention-days: 7
