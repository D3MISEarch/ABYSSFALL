name: Runtime Foundation Tests

on:
  pull_request:
    paths:
      - "scripts/runtime/**"
      - "scripts/persistence/**"
      - "scripts/shared/**"
      - "project.godot"
      - ".github/workflows/runtime-foundation-tests.yml"
  push:
    branches:
      - main
    paths:
      - "scripts/runtime/**"
      - "scripts/persistence/**"
      - "scripts/shared/**"
      - "project.godot"
      - ".github/workflows/runtime-foundation-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: runtime-foundation-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-foundation-smoke-test:
    name: Godot 4.4.1 Runtime Foundation Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.4.1
          use-dotnet: false
          include-templates: false

      - name: Show Godot version
        run: godot --version

      - name: Import project
        run: godot --headless --editor --path . --quit

      - name: Run runtime foundation smoke tests
        shell: bash
        run: |
          set -o pipefail
          godot --headless --path . --script res://scripts/runtime/tests/test_runtime_foundation.gd 2>&1 | tee runtime-foundation-test.log

      - name: Upload runtime test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-foundation-test-log
          path: runtime-foundation-test.log
          if-no-files-found: warn
          retention-days: 7
