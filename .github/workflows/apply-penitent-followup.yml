name: Apply Penitent Audit Follow-up

on:
  push:
    branches:
      - fix/penitent-seal-canonical-implementation

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out follow-up branch
        uses: actions/checkout@v4
        with:
          ref: fix/penitent-seal-canonical-implementation
          fetch-depth: 0

      - name: Apply focused source patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check tools/penitent_followup.patch
          git apply tools/penitent_followup.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/characters/penitent_character.gd \
                  scripts/characters/penitent_playable.gd \
                  tests/test_seal_of_binding.gd \
                  docs/PENITENT_CLASS.md
          git commit -m "Canonicalize Penitent Seal placement"
          git push origin HEAD:fix/penitent-seal-canonical-implementation
