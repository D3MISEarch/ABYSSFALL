name: Build Issue 29 clean tree

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-clean-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/penitent-cli-smoke
          fetch-depth: 0

      - name: Create clean tree object
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import urllib.request
          from pathlib import Path

          repository = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          api_root = f"https://api.github.com/repos/{repository}"

          def api(path: str, payload: dict) -> dict:
              request = urllib.request.Request(
                  api_root + path,
                  data=json.dumps(payload).encode("utf-8"),
                  method="POST",
                  headers={
                      "Authorization": f"Bearer {token}",
                      "Accept": "application/vnd.github+json",
                      "X-GitHub-Api-Version": "2022-11-28",
                      "Content-Type": "application/json",
                  },
              )
              with urllib.request.urlopen(request) as response:
                  return json.loads(response.read().decode("utf-8"))

          base_tree = subprocess.check_output(["git", "rev-parse", "HEAD^{tree}"], text=True).strip()
          tree = api("/git/trees", {
              "base_tree": base_tree,
              "tree": [
                  {"path": ".github/workflows/godot-hotfix3-validation.yml", "mode": "100644", "type": "blob", "sha": "b318ebf376c821e10d7a0fae7c8e5bf98c7ab048"},
                  {"path": "scripts/boot.gd", "mode": "100644", "type": "blob", "sha": "19715a552ceed20977941a11711ec9feb79fc76a"},
                  {"path": "docs/CHARACTER_ARCHITECTURE.md", "mode": "100644", "type": "blob", "sha": "c466659c90526722683761b2cab43ca2e1991253"},
                  {"path": ".github/workflows/issue29-apply-focused-patch.yml", "mode": "100644", "type": "blob", "sha": None},
              ],
          })
          Path("issue29-clean-tree.txt").write_text(tree["sha"] + "\n", encoding="utf-8")
          print(f"Built clean tree {tree['sha']}")
          PY

      - name: Upload clean tree SHA
        uses: actions/upload-artifact@v4
        with:
          name: issue29-clean-tree
          path: issue29-clean-tree.txt
          if-no-files-found: error
          retention-days: 1
