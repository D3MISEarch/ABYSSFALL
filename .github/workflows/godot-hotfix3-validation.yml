name: Validate AbyssFall

on:
  push:
    branches:
      - import-v0.4-hotfix3
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    name: Godot 4.4.1 headless validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact review commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Install Godot 4.4.1
        shell: bash
        run: |
          set -euo pipefail
          GODOT_VERSION="4.4.1"
          GODOT_ARCHIVE="Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/${GODOT_ARCHIVE}"
          mkdir -p "$HOME/godot"
          curl --fail --location --retry 3 "$GODOT_URL" --output /tmp/godot.zip
          unzip -q /tmp/godot.zip -d "$HOME/godot"
          GODOT_BIN="$(find "$HOME/godot" -maxdepth 1 -type f -name 'Godot_v*-stable_linux.x86_64' | head -n 1)"
          chmod +x "$GODOT_BIN"
          ln -s "$GODOT_BIN" "$HOME/godot/godot"
          echo "$HOME/godot" >> "$GITHUB_PATH"
          "$HOME/godot/godot" --version

      - name: Locate project source
        id: source
        shell: bash
        run: |
          set -euo pipefail

          if [[ -f "project.godot" ]]; then
            PROJECT_DIR="$GITHUB_WORKSPACE"
            SOURCE_MODE="root"
          else
            ARCHIVE="abyssfall_void_warlock_v0_4_hotfix3.zip"
            test -f "$ARCHIVE"
            rm -rf /tmp/abyssfall-source
            mkdir -p /tmp/abyssfall-source
            unzip -q "$ARCHIVE" -d /tmp/abyssfall-source
            PROJECT_FILE="$(find /tmp/abyssfall-source -type f -name project.godot | head -n 1)"
            test -n "$PROJECT_FILE"
            PROJECT_DIR="$(dirname "$PROJECT_FILE")"
            SOURCE_MODE="archive"
          fi

          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "source_mode=$SOURCE_MODE" >> "$GITHUB_OUTPUT"
          echo "review_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Godot project: $PROJECT_DIR"
          echo "Source mode: $SOURCE_MODE"
          echo "Exact review commit: $(git rev-parse HEAD)"
          find "$PROJECT_DIR" -maxdepth 3 -type f | sort

      - name: Parse, import, and load the editor
        shell: bash
        run: |
          set -o pipefail
          godot --headless --path "${{ steps.source.outputs.project_dir }}" --editor --quit 2>&1 | tee editor-validation.log

      - name: Fervor resource unit tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_fervor_resource.gd 2>&1 | tee "$GITHUB_WORKSPACE/fervor-tests.log"

      - name: Fervor seal state tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_fervor_seal.gd 2>&1 | tee "$GITHUB_WORKSPACE/fervor-seal-tests.log"

      - name: Rite Mark state tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_rite_mark_component.gd 2>&1 | tee "$GITHUB_WORKSPACE/rite-mark-tests.log"

      - name: Seal of Binding tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_seal_of_binding.gd 2>&1 | tee "$GITHUB_WORKSPACE/seal-of-binding-tests.log"

      - name: Brand of Ruin tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_brand_of_ruin.gd 2>&1 | tee "$GITHUB_WORKSPACE/brand-of-ruin-tests.log"

      - name: Martyr's Chain tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_martyrs_chain.gd 2>&1 | tee "$GITHUB_WORKSPACE/martyrs-chain-tests.log"

      - name: Ashen Procession tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_ashen_procession.gd 2>&1 | tee "$GITHUB_WORKSPACE/ashen-procession-tests.log"

      - name: Sacrament tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_sacrament.gd 2>&1 | tee "$GITHUB_WORKSPACE/sacrament-tests.log"

      - name: Canonical Penitent class gate tests
        shell: bash
        run: |
          set -o pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          godot --headless --path . --script res://tests/test_penitent_class_gates.gd 2>&1 | tee "$GITHUB_WORKSPACE/penitent-class-gate-tests.log"

      - name: Class selection screen smoke test
        shell: bash
        run: |
          set -uo pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          set +e
          timeout 6s godot --headless --path "$PROJECT_DIR" > runtime-class-select.log 2>&1
          STATUS=$?
          set -e
          cat runtime-class-select.log

          if grep -Eiq 'SCRIPT ERROR|Parse Error|Compile Error|Failed to load script|Invalid access|Condition .* is true|ERROR:' runtime-class-select.log; then
            echo "Godot reported an error while displaying class selection."
            exit 1
          fi

          if [[ "$STATUS" -ne 0 && "$STATUS" -ne 124 ]]; then
            echo "Class selection exited unexpectedly with status $STATUS."
            exit "$STATUS"
          fi

      - name: Void Warlock runtime smoke test
        shell: bash
        run: |
          set -uo pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          set +e
          timeout 20s godot --headless --path "$PROJECT_DIR" -- --class=void_warlock > runtime-warlock.log 2>&1
          STATUS=$?
          set -e
          cat runtime-warlock.log

          if grep -Eiq 'SCRIPT ERROR|Parse Error|Compile Error|Failed to load script|Invalid access|Condition .* is true|ERROR:' runtime-warlock.log; then
            echo "Godot reported a parser or runtime error in the Void Warlock path."
            exit 1
          fi

          if [[ "$STATUS" -ne 0 && "$STATUS" -ne 124 ]]; then
            echo "Void Warlock runtime exited unexpectedly with status $STATUS."
            exit "$STATUS"
          fi

          if ! grep -Fq 'ABYSSFALL_CLASS_LAUNCHED:void_warlock' runtime-warlock.log; then
            echo "Void Warlock smoke test never confirmed that the requested class launched."
            exit 1
          fi

          echo "Void Warlock smoke test completed with acceptable status $STATUS."

      - name: Penitent runtime smoke test
        shell: bash
        run: |
          set -uo pipefail
          PROJECT_DIR="${{ steps.source.outputs.project_dir }}"
          set +e
          timeout 20s godot --headless --path "$PROJECT_DIR" -- --class=penitent > runtime-penitent.log 2>&1
          STATUS=$?
          set -e
          cat runtime-penitent.log

          if grep -Eiq 'SCRIPT ERROR|Parse Error|Compile Error|Failed to load script|Invalid access|Condition .* is true|ERROR:' runtime-penitent.log; then
            echo "Godot reported a parser or runtime error in the Penitent path."
            exit 1
          fi

          if [[ "$STATUS" -ne 0 && "$STATUS" -ne 124 ]]; then
            echo "Penitent runtime exited unexpectedly with status $STATUS."
            exit "$STATUS"
          fi

          if ! grep -Fq 'ABYSSFALL_CLASS_LAUNCHED:penitent' runtime-penitent.log; then
            echo "Penitent smoke test never confirmed that the requested class launched."
            exit 1
          fi

          echo "Penitent smoke test completed with acceptable status $STATUS."

      - name: Build independent-verifier handoff package
        if: success() && github.event_name == 'pull_request'
        id: handoff
        shell: bash
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          REVIEW_SHA: ${{ steps.source.outputs.review_sha }}
        run: |
          set -euo pipefail
          SHORT_SHA="${REVIEW_SHA:0:7}"
          PACKAGE_NAME="abyssfall-verifier-pr${PR_NUMBER}-${SHORT_SHA}"
          PACKAGE_DIR="$GITHUB_WORKSPACE/.verifier-package/${PACKAGE_NAME}"

          rm -rf "$GITHUB_WORKSPACE/.verifier-package"
          mkdir -p "$PACKAGE_DIR"
          git archive "$REVIEW_SHA" | tar -x -C "$PACKAGE_DIR"
          git diff --name-only "origin/${BASE_REF}...${REVIEW_SHA}" | sort > "$PACKAGE_DIR/VERIFIER_CHANGED_FILES.txt"
          git ls-tree -r "$REVIEW_SHA" > "$PACKAGE_DIR/VERIFIER_GIT_TREE.txt"

          export PACKAGE_DIR
          python3 - <<'PY'
          import os
          from pathlib import Path

          package_dir = Path(os.environ["PACKAGE_DIR"])
          pr_body = os.environ.get("PR_BODY", "").strip() or "_No pull-request notes were provided._"
          handoff = f"""# AbyssFall Independent Verification Handoff

          ## Change

          {os.environ['PR_TITLE']}

          ## Exact build

          - Repository: {os.environ['GITHUB_REPOSITORY']}
          - Pull request: #{os.environ['PR_NUMBER']}
          - Branch: {os.environ['HEAD_REF']}
          - Base: {os.environ['BASE_REF']}
          - Commit: {os.environ['REVIEW_SHA']}
          - CI run: https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}

          ## Pull-request notes

          {pr_body}

          ## Package authority

          This artifact is a frozen archive of the exact commit validated by the CI run above. Use this package, not a later synced branch, for the formal pass/fail verdict.

          ## Required independent checks

          1. Import the project with Godot 4.4.1.
          2. Run editor/parser/import validation.
          3. Re-run all tests under `tests/`, including the newly changed suite.
          4. Run class selection, Void Warlock, and Penitent headless paths.
          5. Read `AGENTS.md`, especially the standing bug-pattern log.
          6. Manually trace changed code for lifecycle ordering, transforms, input routing, physics math, timing, cleanup, replacement, and overlapping effects.
          7. Report PASS, PASS WITH FOLLOW-UP, FAIL, or NEEDS GRAPHICAL PLAYTEST using `docs/VERIFICATION_REPORT_TEMPLATE.md`.

          ## Integrity manifest

          `VERIFIER_GIT_TREE.txt` records the exact Git blob SHA for every tracked file. CI verifies the staged package and the downloaded artifact against that manifest.

          ## Files changed

          See `VERIFIER_CHANGED_FILES.txt` in this package.
          """
          (package_dir / "VERIFIER_HANDOFF.md").write_text(handoff, encoding="utf-8")
          PY

          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          package_dir = Path(os.environ["PACKAGE_DIR"])
          manifest = package_dir / "VERIFIER_GIT_TREE.txt"
          failures = []

          for line in manifest.read_text(encoding="utf-8").splitlines():
              metadata, relative_path = line.split("\t", 1)
              mode, object_type, expected_sha = metadata.split()
              if object_type != "blob":
                  continue
              target = package_dir / relative_path
              if not os.path.lexists(target):
                  failures.append(f"missing: {relative_path}")
                  continue
              if mode == "120000":
                  actual_sha = subprocess.check_output(
                      ["git", "hash-object", "--stdin"],
                      input=os.readlink(target).encode("utf-8"),
                  ).decode().strip()
              else:
                  actual_sha = subprocess.check_output(
                      ["git", "hash-object", "--no-filters", str(target)]
                  ).decode().strip()
              if actual_sha != expected_sha:
                  failures.append(
                      f"hash mismatch: {relative_path} expected {expected_sha} got {actual_sha}"
                  )

          for required in (
              "VERIFIER_HANDOFF.md",
              "VERIFIER_CHANGED_FILES.txt",
              "VERIFIER_GIT_TREE.txt",
          ):
              if not (package_dir / required).is_file():
                  failures.append(f"missing generated metadata: {required}")

          if failures:
              raise SystemExit("Staged verifier package failed integrity audit:\n" + "\n".join(failures))

          print("Staged verifier package matches every tracked Git blob.")
          PY

          echo "package_path=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "Packaged exact review commit $REVIEW_SHA"
          find "$PACKAGE_DIR" -maxdepth 3 -type f | sort | head -n 120

      - name: Upload independent-verifier handoff package
        if: success() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.handoff.outputs.package_name }}
          path: ${{ steps.handoff.outputs.package_path }}
          include-hidden-files: true
          retention-days: 30
          if-no-files-found: error

      - name: Download uploaded verifier package for audit
        if: success() && github.event_name == 'pull_request'
        uses: actions/download-artifact@v4
        with:
          name: ${{ steps.handoff.outputs.package_name }}
          path: ${{ runner.temp }}/verifier-artifact-audit

      - name: Audit downloaded verifier package
        if: success() && github.event_name == 'pull_request'
        shell: bash
        env:
          AUDIT_DIR: ${{ runner.temp }}/verifier-artifact-audit
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          audit_dir = Path(os.environ["AUDIT_DIR"])
          manifest = audit_dir / "VERIFIER_GIT_TREE.txt"
          failures = []

          if not manifest.is_file():
              raise SystemExit("Downloaded verifier artifact is missing VERIFIER_GIT_TREE.txt")

          for line in manifest.read_text(encoding="utf-8").splitlines():
              metadata, relative_path = line.split("\t", 1)
              mode, object_type, expected_sha = metadata.split()
              if object_type != "blob":
                  continue
              target = audit_dir / relative_path
              if not os.path.lexists(target):
                  failures.append(f"missing after upload: {relative_path}")
                  continue
              if mode == "120000":
                  actual_sha = subprocess.check_output(
                      ["git", "hash-object", "--stdin"],
                      input=os.readlink(target).encode("utf-8"),
                  ).decode().strip()
              else:
                  actual_sha = subprocess.check_output(
                      ["git", "hash-object", "--no-filters", str(target)]
                  ).decode().strip()
              if actual_sha != expected_sha:
                  failures.append(
                      f"hash mismatch after upload: {relative_path} expected {expected_sha} got {actual_sha}"
                  )

          for required in (
              "VERIFIER_HANDOFF.md",
              "VERIFIER_CHANGED_FILES.txt",
              "VERIFIER_GIT_TREE.txt",
          ):
              if not (audit_dir / required).is_file():
                  failures.append(f"missing generated metadata after upload: {required}")

          if failures:
              raise SystemExit("Uploaded verifier artifact failed integrity audit:\n" + "\n".join(failures))

          print("Downloaded verifier artifact matches every tracked Git blob.")
          PY

      - name: Promote validated source into repository root
        if: github.event_name == 'push' && steps.source.outputs.source_mode == 'archive'
        shell: bash
        run: |
          set -euo pipefail
          SOURCE="${{ steps.source.outputs.project_dir }}"

          cp "$SOURCE/project.godot" ./project.godot
          cp "$SOURCE/main.tscn" ./main.tscn
          [[ -f "$SOURCE/gdlintrc" ]] && cp "$SOURCE/gdlintrc" ./gdlintrc

          rm -rf scripts concept
          cp -R "$SOURCE/scripts" ./scripts
          [[ -d "$SOURCE/concept" ]] && cp -R "$SOURCE/concept" ./concept

          mkdir -p docs/v0.4-hotfix3
          for FILE in HOTFIX3_NOTES.md NEXT_STEPS.md PLAYTEST_CHECKLIST.md PROJECT_ROADMAP.md README.md V0_4_SYSTEMS.md; do
            if [[ -f "$SOURCE/$FILE" ]]; then
              cp "$SOURCE/$FILE" "docs/v0.4-hotfix3/$FILE"
            fi
          done

          rm -f abyssfall_void_warlock_v0_4_hotfix3.zip

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add project.godot main.tscn gdlintrc scripts concept docs/v0.4-hotfix3 abyssfall_void_warlock_v0_4_hotfix3.zip

          if git diff --cached --quiet; then
            echo "No source promotion changes were required."
            exit 0
          fi

          git commit -m "Import validated AbyssFall v0.4 Hotfix 3 source"
          git push origin HEAD:import-v0.4-hotfix3

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: godot-validation-logs
          path: |
            editor-validation.log
            fervor-tests.log
            fervor-seal-tests.log
            rite-mark-tests.log
            seal-of-binding-tests.log
            brand-of-ruin-tests.log
            martyrs-chain-tests.log
            ashen-procession-tests.log
            sacrament-tests.log
            penitent-class-gate-tests.log
            runtime-class-select.log
            runtime-warlock.log
            runtime-penitent.log
          include-hidden-files: true
          if-no-files-found: warn
